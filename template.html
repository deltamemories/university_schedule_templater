<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Template</title>
	<style>
	  /* http://meyerweb.com/eric/tools/css/reset/
		 v2.0 | 20110126
		 License: none (public domain)
	*/

	  html, body, div, span, applet, object, iframe,
	  h1, h2, h3, h4, h5, h6, p, blockquote, pre,
	  a, abbr, acronym, address, big, cite, code,
	  del, dfn, em, img, ins, kbd, q, s, samp,
	  small, strike, strong, sub, sup, tt, var,
	  b, u, i, center,
	  dl, dt, dd, ol, ul, li,
	  fieldset, form, label, legend,
	  table, caption, tbody, tfoot, thead, tr, th, td,
	  article, aside, canvas, details, embed,
	  figure, figcaption, footer, header, hgroup,
	  menu, nav, output, ruby, section, summary,
	  time, mark, audio, video {
		  margin: 0;
		  padding: 0;
		  border: 0;
		  font-size: 100%;
		  font: inherit;
		  vertical-align: baseline;
	  }
	  /* HTML5 display-role reset for older browsers */
	  article, aside, details, figcaption, figure,
	  footer, header, hgroup, menu, nav, section {
		  display: block;
	  }
	  body {
		  line-height: 1;
	  }
	  ol, ul {
		  list-style: none;
	  }
	  blockquote, q {
		  quotes: none;
	  }
	  blockquote:before, blockquote:after,
	  q:before, q:after {
		  content: '';
		  content: none;
	  }
	  table {
		  border-collapse: collapse;
		  border-spacing: 0;
	  }
	</style>

	<style>
		body { font-family: "Montserrat", serif; padding: 0; margin: 0; white-space: nowrap; width: fit-content}
	 	#schedule {padding: 40px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;}
		.day-schedule {display: flex; gap: 22px; flex-direction: column; padding: 30px}
		.day-name {font-size: 22px; font-weight: 400; color: #080808}
		.schedule-table {display: flex; flex-direction: column; gap: 14px}
		.schedule-row {display: flex; flex-direction: row; align-items: center; justify-content: left; gap: 12px; padding-left: 6px}
		p {font-size: 18px; color: #4d4d4d}
		.number {font-size: 20px}
	</style>
</head>
<body>
	<div id="schedule">
		{{#each this}}
		<div class="day-schedule">
			<p class="day-name">{{dayOfWeek}}</p>
			{{#if classes}}
				<div class="schedule-table">
						{{#each classes}}
						<div class="schedule-row">
							<p class="number">{{number}}</p>
							<p>{{subject}}</p>
							<p>{{room}}</p>
						</div>
						{{/each}}
				</div>
			{{else}}
				<!-- Empty day-->
			{{/if}}
		</div>
		{{/each}}
	</div>
</body>
</html>
